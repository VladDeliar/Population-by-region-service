services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: population
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d population"]
      interval: 2s
      timeout: 3s
      retries: 15

  get_data:
    build: .
    command: python -m app.main get_data
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/population
      SOURCE: ${SOURCE:-wikipedia}
    depends_on:
      db:
        condition: service_healthy

  print_data:
    build: .
    command: python -m app.main print_data
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/population
      SOURCE: ${SOURCE:-wikipedia}
    depends_on:
      db:
        condition: service_healthy

  # Bonus: HTTP API on top of the same database (not required by the check flow)
  api:
    build: .
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/population
      SOURCE: ${SOURCE:-wikipedia}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
